<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&amp;family=DM+Sans:wght@300;400;600&amp;display=swap');
    </style>
  </defs>

  <!-- Square background -->
  <rect width="500" height="500" rx="48" fill="#eaf5f2"/>

  <!-- Horizontal capsule icon, centered upper area -->
  <!-- Left dark half -->
  <rect x="148" y="148" width="102" height="76" rx="38" fill="#0f2e2a"/>
  <!-- Right teal half -->
  <rect x="250" y="148" width="102" height="76" rx="38" fill="#1d8870"/>
  <!-- Cover seam overlap on left side of right half -->
  <rect x="250" y="148" width="18" height="76" fill="#1d8870"/>
  <!-- Cover seam overlap on right side of left half -->
  <rect x="234" y="148" width="16" height="76" fill="#0f2e2a"/>

  <!-- Plus sign in left (dark) half -->
  <line x1="199" y1="172" x2="199" y2="200" stroke="#7ecfc2" stroke-width="6" stroke-linecap="round"/>
  <line x1="185" y1="186" x2="213" y2="186" stroke="#7ecfc2" stroke-width="6" stroke-linecap="round"/>

  <!-- Dot pattern in right (teal) half -->
  <circle cx="275" cy="172" r="5" fill="#0f6e56"/>
  <circle cx="293" cy="172" r="5" fill="#0f6e56"/>
  <circle cx="311" cy="172" r="5" fill="#0f6e56"/>
  <circle cx="275" cy="190" r="5" fill="#0f6e56"/>
  <circle cx="293" cy="190" r="5" fill="#0f6e56"/>
  <circle cx="311" cy="190" r="5" fill="#0f6e56"/>
  <circle cx="275" cy="208" r="5" fill="#0f6e56"/>
  <circle cx="293" cy="208" r="5" fill="#0f6e56"/>
  <circle cx="311" cy="208" r="5" fill="#0f6e56"/>

  <!-- Wordmark: MixaMeds -->
  <text x="250" y="308"
        font-family="Georgia, 'DM Serif Display', serif"
        font-size="68"
        font-weight="normal"
        fill="#0f2e2a"
        text-anchor="middle"
        letter-spacing="-2">Mixa</text>

  <text x="250" y="308"
        font-family="Georgia, 'DM Serif Display', serif"
        font-size="68"
        font-weight="normal"
        font-style="italic"
        fill="#1d8870"
        text-anchor="middle"
        letter-spacing="-2"
        dx="136">Meds</text>

  <!-- Tagline -->
  <text x="250" y="348"
        font-family="Arial, DM Sans, sans-serif"
        font-size="16"
        font-weight="normal"
        fill="#3a6e5e"
        text-anchor="middle"
        letter-spacing="2.5">SIMPLE WEIGHT LOSS, DELIVERED</text>

  <!-- Divider dots -->
  <circle cx="186" cy="384" r="3" fill="#1d8870"/>
  <text x="196" y="389" font-family="Arial, sans-serif" font-size="13" fill="#3a6e5e" letter-spacing="0.5">GLP-1 Telehealth</text>
  <circle cx="314" cy="384" r="3" fill="#1d8870"/>
  <text x="324" y="389" font-family="Arial, sans-serif" font-size="13" fill="#3a6e5e" letter-spacing="0.5">No Contracts</text>

  <!-- URL -->
  <text x="250" y="434"
        font-family="Arial, sans-serif"
        font-size="14"
        fill="#1d8870"
        text-anchor="middle"
        letter-spacing="1">mixameds.com</text>
</svg>
