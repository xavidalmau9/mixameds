<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MixaMeds | National Telehealth Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">Find Specialized Clinics Nationally</h1>
        
        <div class="flex flex-wrap gap-4 mb-8 bg-white p-4 rounded shadow">
            <select id="stateSearch" class="border p-2 rounded">
                <option value="all">All States</option>
                <option value="FL">Florida</option>
                <option value="TX">Texas</option>
                <option value="PA">Pennsylvania</option>
            </select>
            <input type="text" id="zipSearch" placeholder="Zip Code" class="border p-2 rounded">
            <select id="goalSearch" class="border p-2 rounded">
                <option value="all">Any Health Goal</option>
                <option value="Longevity">Longevity</option>
                <option value="Weight">Weight Management</option>
            </select>
            <button onclick="filterTable()" class="bg-teal-600 text-white px-6 py-2 rounded">Search</button>
        </div>
        
        <table class="w-full bg-white rounded shadow">
            <thead><tr class="bg-gray-100 text-left"><th class="p-3">State</th><th class="p-3">Clinic</th><th class="p-3">Specialty</th></tr></thead>
            <tbody id="clinicTableBody"></tbody>
        </table>
    </div>

    <script>
        const CSV_URL = 'YOUR_GOOGLE_SHEET_CSV_URL';

        async function fetchClinics() {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            const tbody = document.getElementById('clinicTableBody');
            
            rows.forEach(row => {
                const [state, name, specialty, zip] = row.split(',');
                if(!name) return;
                tbody.innerHTML += `<tr data-state="${state}" data-zip="${zip}" data-focus="${specialty}">
                    <td class="p-3">${state}</td><td class="p-3">${name}</td><td class="p-3">${specialty}</td></tr>`;
            });
        }

        function filterTable() {
            const state = document.getElementById('stateSearch').value;
            const zip = document.getElementById('zipSearch').value;
            const goal = document.getElementById('goalSearch').value;
            
            document.querySelectorAll('#clinicTableBody tr').forEach(row => {
                const matches = (state === "all" || row.dataset.state === state) && 
                                (zip === "" || row.dataset.zip === zip) && 
                                (goal === "all" || row.dataset.focus === goal);
                row.style.display = matches ? "" : "none";
            });
        }
        window.onload = fetchClinics;
    </script>
</body>
</html>
