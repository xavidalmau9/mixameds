<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MixaMeds | Precision Telehealth & Wellness</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <nav class="bg-white shadow-sm px-6 py-4 flex justify-between items-center">
        <div class="text-2xl font-extrabold text-teal-700 tracking-tight">MixaMeds.</div>
    </nav>

    <header class="max-w-4xl mx-auto mt-16 text-center px-4">
        <h1 class="text-4xl font-extrabold text-slate-900">Find Specialized Clinics in Your Area</h1>
        <div class="mt-8 flex flex-col md:flex-row gap-4 justify-center items-center bg-white p-6 rounded-lg shadow-md">
            <input type="text" id="zipSearch" placeholder="Enter Zip Code" class="border p-3 rounded-md w-full md:w-48">
            <select id="goalSearch" class="border p-3 rounded-md w-full md:w-48">
                <option value="all">Any Health Goal</option>
                <option value="Longevity">Longevity & Biohacking</option>
                <option value="Weight">Weight Management</option>
                <option value="Hormone">Hormone Health</option>
            </select>
            <button onclick="filterProviders()" class="bg-teal-600 text-white px-8 py-3 rounded-md font-bold hover:bg-teal-700">Search</button>
        </div>
    </header>

    <section class="max-w-5xl mx-auto mt-12 px-4">
        <table class="min-w-full bg-white rounded-lg shadow overflow-hidden">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Clinic</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Specialty</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Action</th>
                </tr>
            </thead>
            <tbody id="providerBody">
                <tr data-focus="Longevity" data-zip="33139">
                    <td class="px-6 py-4">Apex Health</td>
                    <td class="px-6 py-4">Longevity & Biohacking</td>
                    <td class="px-6 py-4"><button onclick="openModal('Apex Health')" class="text-teal-600 font-bold hover:underline">Get Matched</button></td>
                </tr>
            </tbody>
        </table>
    </section>

    <div id="intakeModal" class="fixed inset-0 bg-slate-900 bg-opacity-75 hidden flex justify-center items-center px-4">
        <div class="bg-white w-full max-w-md p-6 rounded-xl">
            <h3 id="modalTitle" class="text-xl font-bold mb-4">Connect with Clinic</h3>
            <form id="leadForm" onsubmit="submitLead(event)">
                <input type="text" id="fullName" placeholder="Full Name" required class="w-full border p-2 mb-4 rounded">
                <input type="email" id="email" placeholder="Email" required class="w-full border p-2 mb-4 rounded">
                <button type="submit" class="w-full bg-teal-600 text-white py-3 rounded font-bold">Submit</button>
            </form>
        </div>
    </div>

    <script>
        function filterProviders() {
            const zip = document.getElementById('zipSearch').value;
            const goal = document.getElementById('goalSearch').value;
            // Logic to hide/show table rows based on data attributes
            console.log("Filtering by", zip, goal);
        }
        function openModal(name) {
            document.getElementById('modalTitle').innerText = "Connect with " + name;
            document.getElementById('intakeModal').classList.remove('hidden');
        }
        function submitLead(e) { e.preventDefault(); alert("Lead captured!"); }
    </script>
</body>
</html>
